<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>1-800</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
/* General Styles */

body {background:#0a0a0a; color:#e8e8e8; font-family:'Inter',sans-serif; min-height:100vh; overflow:hidden; position:relative;}
#bg-image{position:fixed; inset:0; background-size:cover; background-position:center; background-repeat:no-repeat; z-index:0; opacity:0; transition:opacity 0.6s ease;}
#bg-image.loaded{opacity:1;}
#bg-image::after{content:''; position:absolute; inset:0; background:rgba(0,0,0,0.35);}
canvas{position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;}

/* Landing */
#landing{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:100; background:#0a0a0a; cursor:pointer;}
#landing.fade-out{opacity:0; pointer-events:none; transition:opacity 0.8s;}
.enter-text{font-size:clamp(0.85rem,2.5vw,1.05rem); font-weight:300; letter-spacing:0.25em; color:#555; text-transform:lowercase;}
.blink{animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Main container */
#main{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2; opacity:0; pointer-events:none; transition:opacity 0.8s ease 0.3s;}
#main.visible{opacity:1; pointer-events:all;}

/* Big title above cards */
#site-title{
  font-family: 'Press Start 2P', cursive;
  font-size: 4rem;
  color: #e8e8e8;
  margin-bottom: 40px; /* space between title and cards */
  text-align: center;
  position: absolute;
  top: 5vh; /* moves title ~25% up visually */
}

/* Cards container */
.cards{display:flex; gap:48px; flex-wrap:wrap; justify-content:center;}

/* Card */
.card{background:rgba(10,10,10,0.55); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.18); border-radius:4px; width:200px; height:auto; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:12px; transition:border-color 0.2s, transform 0.2s;}
.card:hover{border-color:rgba(255,255,255,0.45); transform:translateY(-3px);}
.avatar{width:72px; height:72px; border-radius:50%; background:#1a1a1a; border:1px solid rgba(255,255,255,0.12); object-fit:cover; display:block;}
.name{font-size:0.92rem; font-weight:700; color:#e8e8e8; line-height:1;}

/* Social links */
.social-links{display:flex; gap:14px; margin-top:4px;}
.social-btn{display:inline-flex; align-items:center; justify-content:center; background:transparent; border:none; padding:3px; cursor:pointer; color:#555; text-decoration:none; transition:color 0.15s, transform 0.15s;}
.social-btn:hover{color:#e8e8e8; transform:scale(1.2);}
.social-btn svg{width:18px; height:18px;}

/* Status / Quote */
.status{font-size:0.65rem; font-style:italic; color:#bbb; text-align:center; margin-top:6px;}
</style>
</head>
<body>

<div id="bg-image"></div>
<canvas id="snow"></canvas>
<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<!-- Landing -->
<div id="landing">
  <span class="enter-text">click anywhere to enter<span class="blink"> _</span></span>
</div>

<!-- Main -->
<div id="main">
  <!-- Big title -->
  <div id="site-title">1-800</div>

  <div class="cards" id="cards-container"></div>
</div>

<script>
// ----------------- CONFIG CARDS -----------------
const cardData = [
  {name:"rezi", avatar:"avatar1.png", telegram:"https://t.me/rezi_lol/", discord:"https://discord.com/users/1469164444264304763", status:"I wanna wear her skin."},
  {name:"pure", avatar:"avatar2.png", telegram:"https://t.me/onlineterrorists/", discord:"https://discord.com/users/1482811740826636451", status:"I didnt provide a qoute so rezi put this."},
  {name:"scrapted", avatar:"avatar3.png", telegram:"https://t.me/baits", discord:"https://discord.com/users/1478597712294314005", status:"I bow to no man — I fear none but God."},
  {name:"placeholder", avatar:"avatar4.png", telegram:"", discord:"", status:"Hello world!"}
];

// ----------------- LOAD CARDS -----------------
function loadCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  cardData.forEach(card => {
    const div = document.createElement('div');
    div.classList.add('card');

    div.innerHTML = `
      <img class="avatar" src="${card.avatar}" alt="${card.name}" onerror="this.style.background='#1a1a1a'; this.removeAttribute('src')"/>
      <div class="name">${card.name}</div>
      <div class="social-links">
        ${card.telegram ? `
        <a class="social-btn" href="${card.telegram}" target="_blank" aria-label="Telegram">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.61 7.95l-1.732 8.198c-.13.597-.47.743-.954.462l-2.634-1.943-1.272 1.224c-.14.14-.257.257-.527.257l.189-2.665 4.852-4.384c.21-.189-.046-.296-.326-.107l-6.002 3.771-2.583-.81c-.562-.175-.573-.562.117-.828l10.09-3.895c.467-.154.874.107.724.828z"/>
          </svg>
        </a>` : ''}
        ${card.discord ? `
        <a class="social-btn" href="${card.discord}" target="_blank" aria-label="Discord">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
        </a>` : ''}
      </div>
      ${card.status ? `<div class="status">"${card.status}"</div>` : ''}
    `;
    container.appendChild(div);
  });
}

// ----------------- DOMContentLoaded -----------------
document.addEventListener('DOMContentLoaded', ()=>{
  const landing = document.getElementById('landing');
  const main = document.getElementById('main');
  const music = document.getElementById('bg-music');

  landing.addEventListener('click', ()=>{
    landing.classList.add('fade-out');
    main.classList.add('visible');

    music.volume = 0;
    music.play().catch(()=>{});
    const interval = setInterval(()=>{
      if(music.volume<0.5-0.01){music.volume=Math.min(music.volume+0.01,0.5);}
      else{music.volume=0.5; clearInterval(interval);}
    },40);
    setTimeout(()=>landing.style.display='none',900);
  });

  loadCards();

  // ----------------- Snow -----------------
  const canvas = document.getElementById('snow');
  const ctx = canvas.getContext('2d');
  let W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;});
  const flakes = Array.from({length:120},()=>({x:Math.random()*W, y:Math.random()*H, r:Math.random()*2+0.5, speed:Math.random()*0.6+0.2, drift:Math.random()*0.4-0.2, opacity:Math.random()*0.5+0.15}));
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const f of flakes){
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${f.opacity})`;
      ctx.fill();
      f.y+=f.speed; f.x+=f.drift;
      if(f.y>H+5){f.y=-5; f.x=Math.random()*W;}
      if(f.x>W+5) f.x=-5;
      if(f.x<-5) f.x=W+5;
    }
    requestAnimationFrame(draw);
  }
  draw();

  // ----------------- Typing Animation for Browser Tab -----------------
  const titleText = "1-800.sh";
  let index = 0;
  let forward = true;
  const typeSpeed = 200;
  const deleteSpeed = 100;
  const pauseEnd = 800;

  function typeTitle(){
    if(forward){
      index++;
      document.title = titleText.slice(0,index)+'|';
      if(index===titleText.length){forward=false; setTimeout(typeTitle,pauseEnd); return;}
      setTimeout(typeTitle,typeSpeed);
    } else {
      index--;
      document.title = titleText.slice(0,index)+'|';
      if(index===0){forward=true; setTimeout(typeTitle,typeSpeed); return;}
      setTimeout(typeTitle,deleteSpeed);
    }
  }
  typeTitle();
});
</script>

</body>
</html>
